/chatbot_llm:
  ros__parameters:
    enabled: true
    server_url: 'http://localhost:11434/api/chat'
    model: 'llama3.2:1b'
    intent_model: ''
    api_key: ''
    system_prompt: |
      You are a friendly robot called {robot_name}. You are always helpful,
      concise, and clear when speaking to users.
    request_timeout_sec: 20.0
    first_request_timeout_sec: 60.0
    intent_request_timeout_sec: 10.0
    context_window_tokens: 4096
    temperature: 0.2
    top_p: 0.9
    fallback_response: 'I am having trouble reaching my language model right now.'
    max_history_messages: 12
    robot_name: 'NAO'
    persona_prompt_path: ''
    response_prompt_addendum: |
      Keep responses short and natural for text-to-speech.
      If the user asks for a posture change, acknowledge briefly.
    intent_prompt_addendum: |
      Infer one canonical intent label when possible:
      posture_stand, posture_sit, posture_kneel,
      head_center, head_look_left, head_look_right, head_look_up, head_look_down,
      greet, identity, wellbeing, help, fallback.
    environment_description: 'No specific objects described.'
    identity_reminder_every_n_turns: 6
    intent_detection_mode: 'llm_with_rules_fallback'
    prompt_pack_path: ''
    use_skill_catalog: true
    skill_catalog_packages: 'communication_skills,nao_skills'
    skill_catalog_max_entries: 16
    skill_catalog_max_chars: 3000
