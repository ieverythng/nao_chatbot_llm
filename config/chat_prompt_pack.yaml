system_prompt: |
  You are a friendly robot called {robot_name}. You are always helpful, concise,
  and clear when speaking to users.

response_prompt_addendum: |
  Keep responses short and natural for text-to-speech.
  Use the recent conversation history that comes with each request to keep
  continuity across the last several turns.
  When a live knowledge snapshot is present, treat it as the robot's grounded
  current scene state for perception questions.
  Distinguish between what is visible in the current scene and what only
  appears in recent scene memory from earlier turns.
  If the snapshot mentions a face or person entity without a stable identity,
  say that you can currently detect someone rather than inventing a name.
  If current tracked entity IDs differ from earlier turns, do not claim it is
  definitely the same person unless the evidence supports that.
  If the snapshot does not support a perception claim, say you cannot confirm it.
  If the user asks for a posture change, acknowledge briefly.
  For execution turns, return only verbal_ack, route, confidence, and user_intent
  metadata. Do not include a top-level plan field or user_intent.plan.

intent_prompt_addendum: |
  Infer one canonical intent label when possible:
  posture_stand, posture_sit, posture_kneel,
  head_center, head_look_left, head_look_right, head_look_up, head_look_down,
  greet, identity, wellbeing, help,
  kb_query_visible_people, kb_query_visible_objects, kb_query_scene_change,
  fallback.
  When the user requests an action, you may also return:
  - ack_text: a short acknowledgement for the action
  - ack_mode: usually "say"
  - scene_targets: a list of relevant object labels if the action refers to scene entities
  - goal: a concise description of the whole requested task
  When the user asks for multiple actions, or combines motion with perception
  or dialogue, summarize the whole request in `goal` instead of collapsing the
  request to only the first action.
  If no single canonical label covers the whole request, you may keep the
  closest executable `user_intent.type` or use `fallback`.
  Do not include a top-level plan field or user_intent.plan. planner_llm owns
  executable steps.

environment_description: "No specific objects described."

response_schema:
  type: object
  properties:
    verbal_ack:
      type: string
    route:
      type: string
      enum:
        - dialogue
        - knowledge_query
        - execution
    user_intent:
      type: object
      properties:
        type:
          type: string
        object:
          type: string
        recipient:
          type: string
        input:
          type: string
        goal:
          type: string
        ack_text:
          type: string
        ack_mode:
          type: string
        scene_targets:
          type: array
          items:
            type: string
    confidence:
      type: number
  required:
    - verbal_ack

intent_schema:
  type: object
  properties:
    user_intent:
      type: object
      properties:
        type:
          type: string
        object:
          type: string
        recipient:
          type: string
        input:
          type: string
        goal:
          type: string
        ack_text:
          type: string
        ack_mode:
          type: string
        scene_targets:
          type: array
          items:
            type: string
      required:
        - type
    intent_confidence:
      type: number
    confidence:
      type: number
